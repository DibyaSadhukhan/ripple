{% extends "base.html" %}

{% block title %}Verify OTP | Ripple{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h1 class="h5 mb-0">Verify OTP</h1>
            </div>

            <div class="card-body">
                <p class="text-muted">
                    Enter the 6-digit OTP sent to your email address.
                </p>

                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label" for="id_otp_code">OTP Code</label>
                        <input
                            type="text"
                            name="otp_code"
                            id="id_otp_code"
                            class="form-control"
                            placeholder="Enter 6-digit OTP"
                            maxlength="6"
                            minlength="6"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        Verify & Login
                    </button>
                </form>

                <div class="mt-3 text-center">
                    <a href="{% url 'accounts:login' %}">Request a new OTP</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
